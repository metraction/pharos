# yaml-language-server: $schema=./values.schema.json

image:
  # -- registry for pharos-image
  registry: ghcr.io
  # -- repository for pharos-image
  repository: metraction/pharos
  # -- pull policy for pharos-image
  pullPolicy: Always

# -- list of imagePullSecrets to use. These secrets are also used to get the images to scan.
imagePullSecrets: []
  # - name: github-registry

ingress:
  # -- Enable ingress for pharos
  enabled: false
  # host: "pharos.my-domain.com"
  # className: nginx
  # tls: true
  # tlsSecretName: "pharos-tls"
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   kubernetes.io/ingress.class: nginx
  #   kubernetes.io/tls-acme: 'true'
  #   nginx.ingress.kubernetes.io/client-body-buffer-size: 400M
  #   nginx.ingress.kubernetes.io/proxy-body-size: 8G
  #   nginx.org/client-max-body-size: 8G   

service:
  # -- port for the service
  port: 8080

redis:
  # -- Enable Redis deployment
  enabled: true
  # -- Redis authentication
  auth: false
  # -- Redis replica configuration
  replicas: 3
  persistentVolume:
    size: 2Gi

scannerPod:
  # -- Enable the scanner pod, only neeed if you are not using direct scan
  enabled: false

priorityScannerPod:
  # -- Enable the scanner pod, only needed if you are not using direct scan
  enabled: false

externalDatabase:
  # -- Existing Secret containing dsn for an external database, set this if postgres.enabled=false must contain dsn: "postgres://username:password@hostname:5432/dbname?sslmode=disable"
  secret: "postgres-connection"

# -- PostgreSQL configuration
postgres:
  enabled: true
  image:
    registry: "docker.io"
    repository: "postgres"
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: "17.6"
  # -- Enable PostgreSQL deployment
  dataDir: "/var/lib/postgresql/data"
  pgDir: "pg"
  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  # -- PostgreSQL startup probe configuration
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
    successThreshold: 1
    periodSeconds: 10
  # -- PostgreSQL liveness probe configuration  
  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
    periodSeconds: 10
  # -- PostgreSQL readiness probe configuration  
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
    periodSeconds: 10
  # -- PostgreSQL resources 
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  # -- PostgreSQL persistence storage configuration  
  storage:
    ## Internal volume name and prefix of a created PVC
    volumeName: "postgres-data"
    ## Alternative set requestedSize to define a size for a dynmaically created PVC
    requestedSize: 1Gi
    ## the storage class name
    className:
    ## Default access mode (ReadWriteOnce)
    accessModes:
      - ReadWriteOnce
    ## Keep a created Persistent volume claim when uninstalling the helm chart (only for option useDeployment: true)
    keepPvc: false
    ## Additional storage annotations
    annotations: {}
    ## Additional storage labels
    labels: {}
  ## Pod management policy
  podManagementPolicy: OrderedReady
  ## Pod update strategy
  updateStrategyType: RollingUpdate

  ## Pod security context uses file system group 999 (postgres)
  podSecurityContext:
    fsGroup: 999
    supplementalGroups:
      - 999

  ## Default security options to run PostgreSQL as non-root (postgres user), read only container without privilege escalation
  securityContext:
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsGroup: 999
    runAsUser: 999
    capabilities:
      drop:
        - ALL
  ## The postgres service configuration (Default is ClusterIP with port 5432)
  service:
    type: ClusterIP
    port: 5432
    ## The node port (only relevant for type LoadBalancer or NodePort)
    nodePort:
    ## The cluster ip address (only relevant for type LoadBalancer or NodePort)
    clusterIP:
    ## The loadbalancer ip address (only relevant for type LoadBalancer)
    loadBalancerIP:
    ## The list of IP CIDR ranges that are allowed to access the load balancer (only relevent for type LoadBalancer)
    loadBalancerSourceRanges: []
    ## Annotations to add to the service
    annotations: {}
    ## Labels to add to the service
    labels: {}
  # -- PostgreSQL authentication
  auth:
    # -- Use an existing secret for PostgreSQL connection
    #existingSecret: "postgres-connection"
    postgresPassword: "pharos"
    username: "pharos"
    password: "pharos"
    database: "pharos"
    # secretKeys:
    #   adminPasswordKey: ""
    #   userPasswordKey: ""

# -- External Redis configuration (used when redis.enabled=false)
externalRedis:
  host: "localhost"
  port: 6379

# -- Service account configuration - needed to read ImagePullSecrets
serviceAccount:
  create: true

# -- Role configuration - needed to read ImagePullSecrets
role:
  create: true

controller:
  # -- Number of replicas for the controller
  replicas: 1
  collector:
    # -- Queue size for the collector
    queueSize: 100
  publisher:
    # -- Queue size for the publisher
    queueSize: 1000
  # Resources for the controller
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

scheduler:
  # Resources for the scheduler
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

# -- Prometheus configuration for scanning images
prometheus:
  # -- Url of the Prometheus server
  url: "http://prometheus.prometheus.svc.cluster.local:9090"
  # -- Prometheus query to get the images to scan
  query: 'kube_pod_container_info{}'
  # -- Interval for scanning images
  interval: 10m
  # -- Context labels to add to the Prometheus context
  contextLabels: "namespace"
  # -- Time to live for the scan results, defaults to 12 hours
  ttl: "12h"
  # -- Authentication for Prometheus
  auth:
    # -- Username for Prometheus authentication
    username: ""
    # -- Password for Prometheus authentication
    password: ""
    # -- Token for Prometheus authentication
    token: ""
  authFromSecret:
    # -- Enable authentication from an existing secret
    enabled: false
    # -- Use an existing secret for Prometheus authentication
    existingSecret: ""
    # -- Key in the secret for the username
    usernameKey: "username"
    # -- Key in the secret for the password
    passwordKey: "password"
    # -- Key in the secret for the token
    tokenKey: ""

# -- Enrichers configuration
enrichers:
  # -- where to store the enricher configuration, this will create a configMap with the given name and store the enricher configuration there, the controller will then read the enricher configuration from this configMap
  configMap: pharos-enrichers
  config: enrichers/enricher.yaml
  # -- order of the enrichers, this is the order in which the enrichers will be executed, if not set, the enrichers will be executed in the order they are defined in the configMap
  order:
    - eos
    - owner
    - waive-images
    - findings-summary
  # -- definitions of the enrichers, this is where you define the enrichers, the name of the enricher will be used in the order section to define the order   
  definitions:
    # -- End of support enricher, this enricher will add the end of support date for the base image, it uses the eos-eos.yaml file to get the end of support date for the base image, you can customize this file to add more images and their end of support date
    eos:
      config:
        - type: file
          name: eos-eos.yaml
          ref: eos
          file: files/eos-eos.yaml
        - type: hbs
          name: eos-eos_v1.hbs
          content: |
            distro: {{ .payload.Image.DistroName }}
            version: {{ .payload.Image.DistroVersion }}
            eos: {{ index .meta.eos .payload.Image.DistroName | filter "version" "matchWildcard" .payload.Image.DistroVersion | map "field" "eos" | first }}
    # -- Owner enricher, this enricher will add the owner of the image, you can customize this enricher to add more logic to determine the owner of the image, for example based on the namespace or other context labels
    owner:
      config:
        - type: file
          name: owner-owners.yaml
          ref: owners
          content: |
            byNamespace:
              - namespace: kube-system
                owner: john@mail.com
              - namespace: default
                owner: jessica@mail.com
        - type: hbs
          name: owner-owners_v1.hbs
          ref: ""
          content: |
            {{- $contextRoot := .payload.Image.ContextRoots | first }}
            {{- $namespace := ($contextRoot.Contexts | filter "Owner" "startsWith" "pharos-controller" | first).Data.namespace }}
            owner: {{ .meta.owners.byNamespace | filter "namespace" "startsWith" $namespace | map "field" "owner" | first | toYaml | nindent 2 }}
    # -- Waive images enricher, this enricher will add a waived field to the context if the image is in a namespace that should be waived, you can customize this enricher to add more logic to determine if an image should be waived or not
    waive-images:
      disabled: false
      config:
        - type: starlark
          name: waive-images.star
          content: |
            #!/usr/bin/env star

            # Return summary of findings
            def enrich(input):
                data = input.payload
                waived = "false"
                namespace = data.Image.ContextRoots[0].Contexts[0].Data.namespace
                if namespace == "kube-system":
                  waived = "true"
                if namespace == "cattle-system":
                  waived = "true"
                if namespace == "cattle-fleet-system":
                  waived = "true"
                if namespace == "cattle-monitoring-system":
                  waived = "true"
                return { 
                    "waived": waived,
                }
    # -- Findings summary enricher, this enricher will add a summary of the findings to the context, you can customize this enricher to add more logic to determine the summary of the findings, for example based on the severity of the findings or other context labels    
    findings-summary:
      config:
        - type: starlark
          enabled: true
          name: findings-summary.star
          content: |
            #!/usr/bin/env star

            # Return summary of findings
            def enrich(input):
                data = input.payload
                severity_01_critical = 0
                severity_02_high = 0
                severity_03_medium = 0
                severity_04_low = 0
                severity_05_negligible = 0
                if data.Image.Findings == None:
                    print("error iterating through findings, value of findings: " + str(data.Image.Findings))
                else:
                    for finding in data.Image.Findings:
                        if finding.Severity == "Critical":
                            severity_01_critical += 1
                        elif finding.Severity == "High":
                            severity_02_high += 1
                        elif finding.Severity == "Medium":
                            severity_03_medium += 1
                        elif finding.Severity == "Low":
                            severity_04_low += 1
                        elif finding.Severity == "Negligible":
                            severity_05_negligible += 1
                alerted = False
                if severity_01_critical > 0 or severity_02_high > 0:
                    alerted = True
                return {
                    "Severity01Critical": severity_01_critical,
                    "Severity02High": severity_02_high,
                    "Severity03Medium": severity_03_medium,
                    "Severity04Low": severity_04_low,
                    "Severity05Negligible": severity_05_negligible,
                    "Alerted": alerted
                }               
  uiUrl: "" # leave empty to disable UI enrichers
  #uiUrl: "http://pharos-client.pharos-client.svc.cluster.local:3000" # URL to the Pharos UI, used in enrichers to run visual enrichers.

caCertificates:
  # -- Enable CA certificates configMap
  configMapEnabled: false
  # -- Enable CA certificates in the reporter pod
  enabled: false
  # -- ConfigMap name for CA certificates, bring your own if configMapEnabled is true
  configMapName: ca-certificates
    
alerting:
  # -- Alerting configuration this basically follows the prometheus alertmanager configuration
  route:
    group_by: ["..."]
    continue: true
    receiver: default
    child_routes: []
  receivers:
    # -- list of receivers to receive alerts
    - name: "default"
    # Uncomment the following to enable alerting via jiralert, or see a complete example in values-jiralert-example.yaml
    # - name: "jira"
    #   webhook_configs:
    #     - url: "http://pharos-jiralert:9097/alert"
    #       send_resolved: true

